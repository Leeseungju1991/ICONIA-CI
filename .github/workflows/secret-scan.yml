###############################################################################
# secret-scan.yml — gitleaks 시크릿 스캔.
#
# AWS 키/토큰/패스워드 패턴을 커밋 이력에서 탐지한다.
# push(main) + PR + 주 1회 스케줄.
#
# 결과:
#   - EXIT_CODE=1: 시크릿 검출 시 워크플로우 실패 (PR merge 차단 가능).
#   - SARIF 업로드로 GitHub Security 탭 추적.
###############################################################################
name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks detect (full history)
        run: |
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 1 \
            --redact \
            --log-level warn || EXIT=$?
          echo "GITLEAKS_EXIT=${EXIT:-0}" >> "$GITHUB_ENV"

      - name: Upload SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Summary
        if: always()
        run: |
          if [ "${GITLEAKS_EXIT:-0}" = "1" ]; then
            echo "## secret-scan: FAIL" >> "$GITHUB_STEP_SUMMARY"
            echo "gitleaks 가 시크릿을 검출했습니다. GitHub Security 탭에서 확인 후 즉시 rotate 하세요." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "## secret-scan: PASS" >> "$GITHUB_STEP_SUMMARY"
            echo "시크릿 미검출." >> "$GITHUB_STEP_SUMMARY"
          fi
