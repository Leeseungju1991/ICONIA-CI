###############################################################################
# test-gate.yml — 6개 레포 테스트 게이트.
#
# 배포 전 SERVER / AI / ADMIN 의 단위 테스트 + lint + typecheck 를 실행한다.
# 하나라도 실패하면 후속 deploy 워크플로우가 진행되지 않는다 (deploy.yml 이
# 본 워크플로우의 성공을 needs/조건으로 참조).
#
# trigger:
#   - 매 push (main) / PR  → CI 리포 자체 검증 + (sibling 존재 시) 3개 서비스 테스트
#   - workflow_call        → deploy.yml 이 배포 직전 게이트로 호출
#
# sibling 레포(SERVER/AI/ADMIN)는 별도 private repo 이므로 checkout 에
# ICONIA_REPO_TOKEN (org-scoped PAT 또는 GitHub App token) 이 필요하다.
# 토큰이 없으면 해당 잡은 graceful-skip (단일 리포 CI 만 검증).
###############################################################################
name: test-gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      ref:
        description: '체크아웃할 sibling 레포 ref (기본 main).'
        required: false
        type: string
        default: main
      # 2026-06-05 — 서비스 스코프 인자. deploy.yml 의 service 입력(all/server/ai/admin)
      # 을 받아 gate-summary 가 관련 서비스만 강제 통과 요구. 'all' / unset 이면
      # 기존 정책(서버/AI/어드민 모두 강제). 'admin' 이면 admin-tests 만 강제 — 사전
      # 부채를 가진 server/ai 테스트가 어드민 핫픽스 배포를 막지 않도록 분리.
      service:
        description: '게이트 강제 대상 서비스 (all/server/ai/admin). 기본 all.'
        required: false
        type: string
        default: all
    secrets:
      ICONIA_REPO_TOKEN:
        description: 'sibling private repo checkout 용 토큰.'
        required: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # CI 리포 자체 검증 — 스크립트 문법 + preflight 단위 테스트.
  # ---------------------------------------------------------------------------
  ci-self-check:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - name: Shell 문법 검사 (bash -n)
        run: |
          fail=0
          for f in scripts/*.sh ec2-bootstrap/*.tftpl; do
            [ -f "$f" ] || continue
            if ! bash -n "$f"; then echo "::error file=$f::bash -n 실패"; fail=1; fi
          done
          exit $fail

      - name: shellcheck (best-effort)
        continue-on-error: true
        run: |
          sudo apt-get update -y && sudo apt-get install -y shellcheck
          shellcheck -S warning scripts/*.sh || true

      - name: preflight / soul-catalog 단위 테스트
        run: |
          chmod +x scripts/*.sh
          scripts/preflight-placeholders.test.sh
          scripts/check-soul-catalog-sync.test.sh

      - name: Terraform fmt + validate
        # 2026-06-04 — fix: 워크스페이스에 이미 'terraform/' 디렉토리가 있어 unzip 이
        # 동명 파일 추출 시 prompt 가 떠 NULL 응답으로 binary 가 설치되지 않던 문제.
        # /tmp 로 분리 추출 + -o 강제 overwrite + workspace 로 복귀해 fmt/validate.
        run: |
          set -euo pipefail
          mkdir -p /tmp/tf_install
          ( cd /tmp/tf_install \
              && curl -fsSL https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip -o tf.zip \
              && unzip -qo tf.zip \
              && sudo mv terraform /usr/local/bin/ )
          terraform -chdir=terraform fmt -check -recursive
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate

  # ---------------------------------------------------------------------------
  # SERVER 테스트 — sibling 레포 존재 시.
  # 2026-06-05 — workflow_call 시 inputs.service 가 'admin'/'ai' 면 본 잡 스킵.
  # push/PR(직접 트리거) 와 service=all/server 는 기존대로 실행.
  # 스킵된 잡은 workflow conclusion 에 영향 안 줌(success+skipped 만 있으면 OK).
  # ---------------------------------------------------------------------------
  server-tests:
    if: ${{ (inputs.service || 'all') == 'all' || (inputs.service || 'all') == 'server' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout ICONIA-SERVER
        id: co
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: Leeseungju1991/ICONIA-SERVER
          ref: ${{ inputs.ref || 'main' }}
          token: ${{ secrets.ICONIA_REPO_TOKEN }}
          path: server
      - name: Setup Node
        if: steps.co.outcome == 'success'
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: npm ci + prisma generate + test
        if: steps.co.outcome == 'success'
        working-directory: server
        run: |
          npm ci
          npm run check --if-present
          [ -f prisma/schema.prisma ] && npx --yes prisma generate || true
          npm test
      - name: SERVER 토큰 부재 — 게이트 skip 안내
        if: steps.co.outcome != 'success'
        run: echo "::warning::ICONIA_REPO_TOKEN 미설정 — SERVER 테스트 게이트 건너뜀. 운영자 토큰 등록 필요."

  # ---------------------------------------------------------------------------
  # AI 테스트.
  # 2026-06-05 — workflow_call 시 inputs.service 가 'admin'/'server' 면 본 잡 스킵.
  # ---------------------------------------------------------------------------
  ai-tests:
    if: ${{ (inputs.service || 'all') == 'all' || (inputs.service || 'all') == 'ai' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout ICONIA-AI
        id: co
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: Leeseungju1991/ICONIA-AI
          ref: ${{ inputs.ref || 'main' }}
          token: ${{ secrets.ICONIA_REPO_TOKEN }}
          path: ai
      - name: Setup Node
        if: steps.co.outcome == 'success'
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: npm ci + test
        if: steps.co.outcome == 'success'
        working-directory: ai
        run: |
          npm ci
          npm run check --if-present
          npm test
      - name: AI 토큰 부재 — 게이트 skip 안내
        if: steps.co.outcome != 'success'
        run: echo "::warning::ICONIA_REPO_TOKEN 미설정 — AI 테스트 게이트 건너뜀."

  # ---------------------------------------------------------------------------
  # ADMIN 테스트 — lint + typecheck + vitest + build 검증.
  # 2026-06-05 — workflow_call 시 inputs.service 가 'server'/'ai' 면 본 잡 스킵.
  # ---------------------------------------------------------------------------
  admin-tests:
    if: ${{ (inputs.service || 'all') == 'all' || (inputs.service || 'all') == 'admin' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout ICONIA-ADMIN
        id: co
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: Leeseungju1991/ICONIA-ADMIN
          ref: ${{ inputs.ref || 'main' }}
          token: ${{ secrets.ICONIA_REPO_TOKEN }}
          path: admin
      - name: Setup Node
        if: steps.co.outcome == 'success'
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: npm ci + lint + typecheck + test + build
        if: steps.co.outcome == 'success'
        working-directory: admin
        run: |
          npm ci
          npm run lint --if-present
          npm run typecheck --if-present
          npm test
          npm run build
      - name: ADMIN 토큰 부재 — 게이트 skip 안내
        if: steps.co.outcome != 'success'
        run: echo "::warning::ICONIA_REPO_TOKEN 미설정 — ADMIN 테스트 게이트 건너뜀."

  # ---------------------------------------------------------------------------
  # 게이트 종합 — 위 잡들이 전부 성공해야 deploy 가능.
  # ---------------------------------------------------------------------------
  gate-summary:
    runs-on: ubuntu-latest
    needs: [ci-self-check, server-tests, ai-tests, admin-tests]
    if: always()
    steps:
      - name: 게이트 결과 집계
        env:
          SERVICE_SCOPE: ${{ inputs.service || 'all' }}
          R_CI: ${{ needs.ci-self-check.result }}
          R_SERVER: ${{ needs.server-tests.result }}
          R_AI: ${{ needs.ai-tests.result }}
          R_ADMIN: ${{ needs.admin-tests.result }}
        run: |
          echo "service-scope : ${SERVICE_SCOPE}"   >> "$GITHUB_STEP_SUMMARY"
          echo "ci-self-check : ${R_CI}"            >> "$GITHUB_STEP_SUMMARY"
          echo "server-tests  : ${R_SERVER}"        >> "$GITHUB_STEP_SUMMARY"
          echo "ai-tests      : ${R_AI}"            >> "$GITHUB_STEP_SUMMARY"
          echo "admin-tests   : ${R_ADMIN}"         >> "$GITHUB_STEP_SUMMARY"
          # ci-self-check 는 무조건 통과해야 함.
          [ "${R_CI}" = "success" ] || { echo "::error::ci-self-check 실패"; exit 1; }
          # 2026-06-05 — 서비스 스코프 인자로 강제 대상 분리.
          # all (기본): 3종 모두 success|skipped 요구. push/PR 트리거는 항상 all 정책.
          # admin: admin-tests 만 success|skipped 강제. server/ai 결과는 기록만.
          # server / ai: 각각 동일 정책.
          require() {
            local name="$1" r="$2"
            case "$r" in
              success|skipped) ;;
              *) echo "::error::${name} 게이트 실패: $r"; exit 1 ;;
            esac
          }
          warn_only() {
            local name="$1" r="$2"
            case "$r" in
              success|skipped) ;;
              *) echo "::warning::${name} 결과 ${r} — 본 service 스코프(${SERVICE_SCOPE}) 에서 강제 안 함." ;;
            esac
          }
          case "${SERVICE_SCOPE}" in
            admin)
              require "admin-tests" "${R_ADMIN}"
              warn_only "server-tests" "${R_SERVER}"
              warn_only "ai-tests" "${R_AI}"
              ;;
            server)
              require "server-tests" "${R_SERVER}"
              warn_only "admin-tests" "${R_ADMIN}"
              warn_only "ai-tests" "${R_AI}"
              ;;
            ai)
              require "ai-tests" "${R_AI}"
              warn_only "admin-tests" "${R_ADMIN}"
              warn_only "server-tests" "${R_SERVER}"
              ;;
            all|*)
              require "server-tests" "${R_SERVER}"
              require "ai-tests" "${R_AI}"
              require "admin-tests" "${R_ADMIN}"
              ;;
          esac
          echo "테스트 게이트 통과 (scope=${SERVICE_SCOPE})"
