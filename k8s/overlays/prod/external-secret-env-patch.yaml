# ExternalSecret 의 Secrets Manager path 에서 __ENV__ → prod 치환 (V1.x scaffold)
# JSON Patch 로 모든 ExternalSecret 의 dataFrom[0].extract.key 를 환경별로 교체.
- op: replace
  path: /spec/dataFrom/0/extract/key
  value: iconia/prod/__COMPONENT__
# NOTE: __COMPONENT__ 는 ExternalSecret name 에 따라 결정되므로 실제 적용 시 컴포넌트별
# 개별 patch 파일로 분기하거나, kustomize 의 replacements 기능 사용 권장.
# 본 patch 는 V1.x 라운드에서 component-specific patch 로 확장될 예정.
