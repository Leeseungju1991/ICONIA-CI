# ICONIA — Secret template (External Secrets Operator 패턴, V1.x scaffold)
#
# 본 manifest 는 **실제 secret 값을 포함하지 않는다**. 운영 secret 은 AWS Secrets Manager
# (`iconia/<env>/db/...`, `iconia/<env>/sentry/...`, `iconia/<env>/jwt/...`, etc.) 에 보관되며
# External Secrets Operator (https://external-secrets.io/) 가 ESO `SecretStore` /
# `ExternalSecret` 을 통해 클러스터로 동기화한다.
#
# 적용 전제:
#   1. EKS 클러스터에 ESO Helm 설치 완료 (`external-secrets` namespace)
#   2. IRSA: service account `iconia-eso-sa` 가 Secrets Manager read 권한 IAM role 에 매핑
#   3. Secrets Manager 경로: `iconia/<env>/{server,ai,admin}/<key>`
#
# overlay 가 `namespace:` 와 path 의 `<env>` 부분을 환경별로 patch.
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: iconia
    app.kubernetes.io/managed-by: kustomize
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: iconia-eso-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: iconia-server-secret
  labels:
    app.kubernetes.io/name: iconia-server
    app.kubernetes.io/part-of: iconia
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: iconia-server-secret
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    # overlay 에서 <env> patch — prod / stage
    - extract:
        key: iconia/__ENV__/server
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: iconia-ai-secret
  labels:
    app.kubernetes.io/name: iconia-ai
    app.kubernetes.io/part-of: iconia
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: iconia-ai-secret
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: iconia/__ENV__/ai
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: iconia-admin-secret
  labels:
    app.kubernetes.io/name: iconia-admin
    app.kubernetes.io/part-of: iconia
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: iconia-admin-secret
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: iconia/__ENV__/admin
