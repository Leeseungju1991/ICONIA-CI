# ICONIA AI — ClusterIP Service (V1.x scaffold)
---
apiVersion: v1
kind: Service
metadata:
  name: iconia-ai
  labels:
    app.kubernetes.io/name: iconia-ai
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: iconia
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: iconia-ai
    app.kubernetes.io/part-of: iconia
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
