# ICONIA AI (3. AI, Genome / Gemini 추론 서비스) — V1.x K8s scaffold
#
# GPU 사용은 V1.x 결정 사항. 현재는 CPU 추론 + Gemini API proxy 모델을 가정.
# GPU 도입 시 아래 주석 처리된 nodeSelector / resources.limits 의 nvidia.com/gpu 를 활성화.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iconia-ai
  labels:
    app.kubernetes.io/name: iconia-ai
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: iconia
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: iconia-ai
      app.kubernetes.io/part-of: iconia
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iconia-ai
        app.kubernetes.io/component: inference
        app.kubernetes.io/part-of: iconia
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        runAsGroup: 10002
        fsGroup: 10002
        seccompProfile:
          type: RuntimeDefault
      # GPU 옵션 (V1.x 라운드 활성화 시 주석 해제)
      # nodeSelector:
      #   accelerator: nvidia-gpu
      # tolerations:
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: iconia-ai
      containers:
        - name: ai
          image: iconia-ai:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: iconia-ai-config
            - secretRef:
                name: iconia-ai-secret
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
              # GPU 옵션 (V1.x)
              # nvidia.com/gpu: 1
            limits:
              cpu: "2000m"
              memory: "2Gi"
              # nvidia.com/gpu: 1
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10002
            runAsGroup: 10002
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
        - name: cache
          emptyDir:
            sizeLimit: 512Mi
      terminationGracePeriodSeconds: 30
