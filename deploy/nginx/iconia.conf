# /etc/nginx/conf.d/iconia.conf
#
# ICONIA reverse proxy.
#
# 단일 EC2 + EIP 위에 3개 서브도메인:
#   api.<root>   -> 127.0.0.1:8080  (Server: Express, 디바이스 ingest + App API)
#   ai.<root>    -> 127.0.0.1:8081  (AI: Genome 엔진)
#   admin.<root> -> 127.0.0.1:3000  (Admin: Next.js)
#
# server_name 의 ${ROOT_DOMAIN} 은 EC2 부트스트랩에서 envsubst 로 치환.
# (build-and-upload.ps1 _bootstrap 산출물에는 원본 그대로 - EC2 user-data 가 치환)

# ----- Rate limit zones -----
limit_req_zone $binary_remote_addr zone=iconia_device_ip:10m  rate=60r/m;
limit_req_zone $http_x_api_key     zone=iconia_device_key:10m rate=12r/m;
limit_req_zone $binary_remote_addr zone=iconia_app:10m         rate=60r/m;
limit_req_zone $binary_remote_addr zone=iconia_admin:10m       rate=120r/m;

# Snippet (공통 proxy_set_header) 은 /etc/nginx/snippets/iconia-proxy.conf 에 별도 배치.
# 본 파일은 그 snippet 을 include 만 한다.

# ===== HTTP -> HTTPS redirect (모든 서브도메인 공통) =====
server {
    listen 80;
    listen [::]:80;
    server_name api.${ROOT_DOMAIN} ai.${ROOT_DOMAIN} admin.${ROOT_DOMAIN};

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ===== api.<root> -> Server :8080 =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.${ROOT_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/api.${ROOT_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.${ROOT_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL_API:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; img-src 'self' data:; connect-src 'self'" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    access_log /var/log/nginx/iconia-api.access.log combined;
    error_log  /var/log/nginx/iconia-api.error.log warn;

    client_max_body_size 10m;
    proxy_request_buffering off;

    # 디바이스 ingest (멀티파트, 8 MiB 이미지).
    location = /api/event {
        limit_req zone=iconia_device_ip  burst=20 nodelay;
        limit_req zone=iconia_device_key burst=12 nodelay;
        client_max_body_size 10m;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/iconia-proxy.conf;
        proxy_read_timeout 30s; proxy_send_timeout 30s;
    }
    location = /api/v1/event {
        limit_req zone=iconia_device_ip  burst=20 nodelay;
        limit_req zone=iconia_device_key burst=12 nodelay;
        client_max_body_size 10m;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/iconia-proxy.conf;
        proxy_read_timeout 30s; proxy_send_timeout 30s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        include /etc/nginx/snippets/iconia-proxy.conf;
        access_log off;
    }

    # App 음성 업로드.
    location ~ ^/api/v1/devices/[^/]+/messages/voice$ {
        limit_req zone=iconia_app burst=30 nodelay;
        client_max_body_size 6m;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/iconia-proxy.conf;
        proxy_read_timeout 60s; proxy_send_timeout 60s;
    }

    # App API 일반.
    location / {
        limit_req zone=iconia_app burst=30 nodelay;
        client_max_body_size 2m;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/iconia-proxy.conf;
        proxy_read_timeout 30s;
    }
}

# ===== ai.<root> -> AI :8081 =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai.${ROOT_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/ai.${ROOT_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.${ROOT_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_AI:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    access_log /var/log/nginx/iconia-ai.access.log combined;
    error_log  /var/log/nginx/iconia-ai.error.log warn;

    client_max_body_size 4m;

    location = /health {
        proxy_pass http://127.0.0.1:8081/health;
        include /etc/nginx/snippets/iconia-proxy.conf;
        access_log off;
    }

    location / {
        limit_req zone=iconia_app burst=30 nodelay;
        client_max_body_size 4m;
        proxy_pass http://127.0.0.1:8081;
        include /etc/nginx/snippets/iconia-proxy.conf;
        proxy_read_timeout 60s;
    }
}

# ===== admin.<root> -> Admin (Next.js) :3000 =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.${ROOT_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/admin.${ROOT_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.${ROOT_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_ADMIN:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    access_log /var/log/nginx/iconia-admin.access.log combined;
    error_log  /var/log/nginx/iconia-admin.error.log warn;

    client_max_body_size 5m;

    location = /health {
        proxy_pass http://127.0.0.1:3000/api/health;
        include /etc/nginx/snippets/iconia-proxy.conf;
        access_log off;
    }

    # Next.js static asset (immutable).
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/iconia-proxy.conf;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        limit_req zone=iconia_admin burst=60 nodelay;
        client_max_body_size 5m;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/iconia-proxy.conf;
        proxy_read_timeout 30s;
    }
}
