global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    project: iconia-stress

scrape_configs:
  - job_name: stress-orchestrator
    static_configs:
      - targets: ['host.docker.internal:9091']    # AWS load worker
        labels:
          worker: aws_load

  - job_name: stress-metrics-collector
    static_configs:
      - targets: ['host.docker.internal:9092']
        labels:
          worker: collector

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
