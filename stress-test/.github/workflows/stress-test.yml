name: E2E Wide Stress Test

# manual dispatch + 주간 1회.
# production endpoint 호출 절대 금지 — STRESS_TARGET=staging 강제.

on:
  workflow_dispatch:
    inputs:
      pattern:
        description: 'Load pattern (steady/spike/soak/stress/chaos/...)'
        required: true
        default: 'steady'
      duration_s:
        description: 'Duration in seconds'
        required: true
        default: '300'
      rps:
        description: 'Target RPS'
        required: true
        default: '100'
  schedule:
    - cron: '0 18 * * 0'   # 일요일 18:00 UTC

jobs:
  stress-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STRESS_TARGET: staging
      STAGING_SERVER_BASE: ${{ secrets.STAGING_SERVER_BASE }}
      STAGING_ADMIN_BASE: ${{ secrets.STAGING_ADMIN_BASE }}
      STAGING_AI_BASE: ${{ secrets.STAGING_AI_BASE }}
      STRESS_JWT_TOKEN: ${{ secrets.STRESS_JWT_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.STRESS_GEMINI_API_KEY }}
      STRESS_PATTERN: ${{ github.event.inputs.pattern || 'steady' }}
      STRESS_DURATION_S: ${{ github.event.inputs.duration_s || '300' }}
      STRESS_RPS_TARGET: ${{ github.event.inputs.rps || '100' }}
      GEMINI_MAX_TOKENS_PER_RUN: '500000'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        working-directory: stress-test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: stress-test
        run: pytest tests/ -v --tb=short

      - name: Safety check (no production endpoint)
        working-directory: stress-test
        run: |
          if echo "${STAGING_SERVER_BASE}" | grep -qi "prod"; then
            if ! echo "${STAGING_SERVER_BASE}" | grep -qi "staging"; then
              echo "❌ STAGING_SERVER_BASE looks like production. Aborting."
              exit 2
            fi
          fi

      - name: Run stress test
        working-directory: stress-test
        run: |
          python scripts/orchestrate-load.py

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-report-${{ github.run_number }}
          path: stress-test/reports/output/
          retention-days: 30
