# ICONIA E2E Wide Stress Test — Docker Compose.
# 사용: docker compose up
# Monitoring only: docker compose up -d prometheus grafana loki otel-collector

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: stress-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: stress-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: stress-loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: stress-otel
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./monitoring/otel-collector.yml:/etc/otel/config.yml:ro
    ports:
      - "${OTEL_COLLECTOR_PORT:-4317}:4317"   # OTLP gRPC
      - "4318:4318"                            # OTLP HTTP
    restart: unless-stopped

  # Stress test orchestrator — 전체 시나리오 실행
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stress-orchestrator
    env_file:
      - .env
    volumes:
      - ./reports/output:/app/reports/output
    depends_on:
      - prometheus
      - loki
      - otel-collector
    profiles:
      - run

volumes:
  prom-data:
  grafana-data:
  loki-data:
