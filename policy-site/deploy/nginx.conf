# nginx 자체 호스팅 — 자체 서버에 배포 시 사용.
#
# 사용:
#   1. policy-site/ 전체를 /var/www/iconia-policy/ 로 복사
#   2. 본 conf 를 /etc/nginx/sites-available/iconia-policy 로 복사 + 도메인 수정
#   3. ln -s /etc/nginx/sites-available/iconia-policy /etc/nginx/sites-enabled/
#   4. certbot --nginx -d policy.dollsoom.com
#   5. systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name policy.dollsoom.com;

    # HTTP → HTTPS redirect (certbot 설정 후 자동)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name policy.dollsoom.com;

    root /var/www/iconia-policy;
    index index.html;

    # SSL — certbot 자동 설정
    # ssl_certificate /etc/letsencrypt/live/policy.dollsoom.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/policy.dollsoom.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # 보안 헤더
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'" always;

    # SPA fallback — 모든 경로 index.html 로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Markdown 캐시
    location /content/ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # Assets 캐시
    location /assets/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Hidden files 보호
    location ~ /\. {
        deny all;
    }

    # README / deploy 폴더 직접 접근 차단
    location ~ ^/(README\.md|deploy/) {
        deny all;
        return 404;
    }

    # 액세스 / 에러 로그
    access_log /var/log/nginx/iconia-policy-access.log;
    error_log /var/log/nginx/iconia-policy-error.log;
}
